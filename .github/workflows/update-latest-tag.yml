name: Update Latest Tag

# STUB — kept for filename parity with
# CIRISAgent/.github/workflows/update-latest-tag.yml.
#
# Upstream this re-points the `latest` Docker tag on ghcr.io/cirisai/ciris-agent
# at a specific release. CIRISGame does not ship a server container — it
# ships a WASM bundle hosted as a static site (and native binaries via
# release.yml). There is no `latest` tag to retag.
#
# If/when CIRISGame ships a hosted-play container (the screensaver-mode
# 4-Computer default running as a server-rendered demo on cirisai.org),
# wire this up the same way the agent does — docker login (GITHUB_TOKEN),
# pull versioned image, retag, push.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'No-op until a Docker image exists. See header.'
        required: true
        default: '0.0.0'
