name: Release

# CIRISGame release pipeline. Tag push → build matrix → tarballs + checksums
# + Sigstore keyless signing → GitHub Release.
#
# Platform count: 9 active runner lanes across 10 target platforms.
#   Native desktop (5): linux x86_64, linux aarch64, macOS arm64, macOS x86_64, windows x64
#   WASM browser   (1): wasm32-unknown-unknown  (also the iOS WKWebView payload)
#   WASM Worker    (1): wasm32-wasip1  (daily-seed replay Cloudflare Worker)
#   Android        (2): arm64-v8a, armeabi-v7a  (NDK cross, continue-on-error)
#   iOS            (—): reuses the wasm32-unknown-unknown bundle
#
# Credential lanes (Apple notarization, Windows signing, Google Play, App Store)
# are stubbed as TODOs — wire when the relevant developer accounts exist.

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  id-token: write  # Sigstore keyless signing

jobs:
  # ── Native desktop (5 targets) ────────────────────────────────────────────
  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu  }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,     target: aarch64-apple-darwin      }
          - { os: macos-15-intel,   target: x86_64-apple-darwin       }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc   }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install renderer build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libx11-dev libxkbcommon-dev libwayland-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev pkg-config

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
          key: release-${{ matrix.target }}-${{ github.ref_name }}

      - name: Build (native)
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage + strip binary
        shell: bash
        run: |
          mkdir -p stage
          EXT=""; [ "${{ runner.os }}" = "Windows" ] && EXT=".exe"
          BIN="target/${{ matrix.target }}/release/ciris-game${EXT}"
          if [ -f "$BIN" ]; then
            if [ "${{ runner.os }}" != "Windows" ]; then strip "$BIN" || true; fi
            cp "$BIN" stage/
          else
            find "target/${{ matrix.target }}/release" -maxdepth 1 -type f -perm -u+x \
              -exec cp {} stage/ \; 2>/dev/null || true
          fi
          echo "target=${{ matrix.target }} ref=${{ github.ref_name }}" > stage/BUILD_MANIFEST.txt

      # TODO(release-signing): Apple notarization for macOS lanes.
      # Requires: secrets.APPLE_DEVELOPER_ID_CERT (base64 .p12),
      # secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD, secrets.APPLE_NOTARIZE_USER,
      # secrets.APPLE_NOTARIZE_TEAM_ID, secrets.APPLE_NOTARIZE_APP_PASSWORD.
      #
      # TODO(release-signing): Windows Authenticode signing for the .exe.
      # Requires: secrets.WINDOWS_CERT (base64 .pfx) +
      # secrets.WINDOWS_CERT_PASSWORD.

      - uses: actions/upload-artifact@v4
        with:
          name: ciris-game-${{ matrix.target }}
          path: stage/
          if-no-files-found: warn

  # ── WASM browser bundle (wasm32-unknown-unknown) ──────────────────────────
  # This artifact is also the iOS WKWebView payload.
  build-wasm-browser:
    name: Build wasm32 browser bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
          key: release-wasm-browser-${{ github.ref_name }}
      - name: Install wasm-bindgen-cli
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 30
          command: cargo install wasm-bindgen-cli --version 0.2.126 --locked
      - name: Build wasm
        run: cargo build --release --target wasm32-unknown-unknown
      - name: Stage bundle
        shell: bash
        run: |
          mkdir -p stage
          for w in target/wasm32-unknown-unknown/release/*.wasm; do
            [ -f "$w" ] || continue
            wasm-bindgen --target web --out-dir stage "$w" || true
          done
          if [ -d web ]; then cp -R web/* stage/; fi
          echo "target=wasm32-unknown-unknown ref=${{ github.ref_name }}" > stage/BUILD_MANIFEST.txt
          ls -lh stage/
      - uses: actions/upload-artifact@v4
        with:
          name: ciris-game-wasm32-unknown-unknown
          path: stage/
          if-no-files-found: warn

  # ── WASM replay Worker (wasm32-wasip1, Cloudflare daily-seed) ─────────────
  build-wasm-wasip1:
    name: Build wasm32-wasip1 replay Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
          key: release-wasm-wasip1-${{ github.ref_name }}
      - name: Build wasm32-wasip1
        run: cargo build --release --target wasm32-wasip1
      - name: Stage Worker wasm
        shell: bash
        run: |
          mkdir -p stage
          for w in target/wasm32-wasip1/release/*.wasm; do
            [ -f "$w" ] || continue
            cp "$w" stage/
          done
          echo "target=wasm32-wasip1 ref=${{ github.ref_name }}" > stage/BUILD_MANIFEST.txt
          ls -lh stage/
      - uses: actions/upload-artifact@v4
        with:
          name: ciris-game-wasm32-wasip1
          path: stage/
          if-no-files-found: warn

  # ── Android NDK cross-compiles (arm64-v8a + armeabi-v7a) ─────────────────
  # continue-on-error: NDK cross lane iterating to green; must not block release.
  # TODO(app-store): wire Google Play upload when Play Console account exists.
  build-android:
    name: Build Android (${{ matrix.abi }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { abi: arm64-v8a,   target: aarch64-linux-android,  clang: aarch64-linux-android24-clang    }
          - { abi: armeabi-v7a, target: armv7-linux-androideabi, clang: armv7a-linux-androideabi24-clang }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true
      - name: Export Android cross-compiler env
        shell: bash
        run: |
          TC="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          TUS="$(echo '${{ matrix.target }}' | tr '-' '_')"
          TSC="$(echo "$TUS" | tr '[:lower:]' '[:upper:]')"
          {
            echo "CARGO_TARGET_${TSC}_LINKER=${TC}/${{ matrix.clang }}"
            echo "CC_${TUS}=${TC}/${{ matrix.clang }}"
            echo "AR_${TUS}=${TC}/llvm-ar"
          } >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
          key: release-android-${{ matrix.abi }}-${{ github.ref_name }}
      - name: Build (Android NDK cross)
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage Android lib
        shell: bash
        run: |
          mkdir -p "stage/${{ matrix.abi }}"
          find "target/${{ matrix.target }}/release" -maxdepth 1 \
            \( -name "*.so" -o -name "*.a" \) \
            -exec cp {} "stage/${{ matrix.abi }}/" \; 2>/dev/null || true
          echo "target=${{ matrix.target }} abi=${{ matrix.abi }} ref=${{ github.ref_name }}" \
            > stage/BUILD_MANIFEST.txt
      - uses: actions/upload-artifact@v4
        with:
          name: ciris-game-android-${{ matrix.abi }}
          path: stage/
          if-no-files-found: warn

  # ── Assemble, sign, and publish the GitHub Release ────────────────────────
  create-release:
    name: Create Release
    needs: [build-native, build-wasm-browser, build-wasm-wasip1, build-android]
    # Run as long as the build stage finished (not cancelled) — a single OS
    # lane going red must not suppress the release.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package + checksum
        run: |
          mkdir -p release
          for dir in artifacts/ciris-game-*; do
            [ -d "$dir" ] || continue
            target=$(basename "$dir" | sed 's/ciris-game-//')
            tar -czvf "release/ciris-game-${{ github.ref_name }}-${target}.tar.gz" -C "$dir" .
          done
          # SC2035: use ./* glob so names with dashes are not misread as options.
          cd release && sha256sum ./*.tar.gz > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifacts (Sigstore keyless)
        run: |
          cd release
          for f in ./*.tar.gz SHA256SUMS; do
            cosign sign-blob --yes --output-signature "$f.sig" --output-certificate "$f.pem" "$f"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/*.tar.gz.sig
            release/*.tar.gz.pem
            release/SHA256SUMS
            release/SHA256SUMS.sig
            release/SHA256SUMS.pem
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}

  # TODO(app-store): App Store Connect upload of an iOS WKWebView wrapper.
  # Payload: ciris-game-wasm32-unknown-unknown artifact from build-wasm-browser.
  # Requires: secrets.APPLE_NOTARIZE_USER, secrets.APPLE_NOTARIZE_TEAM_ID,
  # secrets.APPLE_NOTARIZE_APP_PASSWORD, secrets.APPSTORECONNECT_API_KEY_ID,
  # secrets.APPSTORECONNECT_API_ISSUER_ID,
  # secrets.APPSTORECONNECT_API_PRIVATE_KEY (base64 .p8).
