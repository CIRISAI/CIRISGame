name: Update Version Info

# STUB — kept for filename parity with
# CIRISAgent/.github/workflows/update-version.yml (which is itself
# DEPRECATED upstream; the agent moved version stamping to a pre-commit
# hook). CIRISGame's version source-of-truth is Cargo.toml; cargo already
# threads it through every build. No GitHub Actions job is needed.

on:
  workflow_dispatch:
    inputs:
      deprecated_notice:
        description: 'Version is read from Cargo.toml at build time. No update job needed.'
        required: false
        default: 'No-op (mirrors the upstream deprecation).'
