name: CI

# CIRISGame core CI gate — fast, no GPU/system libs required.
#
# Each crate is linted with the feature set it actually compiles under in CI:
#   ciris-game-engine-core  → --all-features   (just `std`; no_std+alloc otherwise)
#   ciris-game-engine       → --features headless  (bevy/std only; no render/wgpu)
#
# `--all-features` on the workspace is INVALID: webgpu+webgl2 are mutually
# exclusive wgpu backends. This gate avoids the clash by linting crates
# individually. The real render builds (native/webgpu/webgl2) live in build.yml.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy-test:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # No apt install here: the core is no_std+alloc; the view crate is linted
      # under `headless` (bevy/std only) — neither pulls bevy_render/wgpu/winit.
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
      # Lint 1 of 2: no_std core with all its features (just `std` today).
      - run: cargo clippy -p ciris-game-engine-core --all-features --all-targets -- -D warnings
      # Lint 2 of 2: view crate in headless mode — no GPU, no window, no system libs.
      # The `headless` feature enables bevy/std and nothing else; it is the only
      # feature combination safe to run on all three CI OSes without system libs.
      - run: cargo clippy -p ciris-game-engine --no-default-features --features headless --all-targets -- -D warnings
      # Tests live in ciris-game-engine-core only; the view crate has none and
      # must not trigger a native Bevy build (display/window deps) on this gate.
      - run: cargo test -p ciris-game-engine-core
      # Doctests: cheap for the no_std core; Linux only for a single canonical record.
      - name: Doctest
        if: runner.os == 'Linux'
        run: cargo test --doc -p ciris-game-engine-core

  # Fast cross-compile check: the no_std core must build for both WASM targets
  # on every push. Full render builds for these targets are in build.yml.
  #   wasm32-unknown-unknown → browser artifact (webgpu/webgl2 via ciris-game-engine)
  #   wasm32-wasip1          → daily-seed replay Cloudflare Worker
  wasm-core:
    name: WASM core compile (wasm32-unknown-unknown + wasm32-wasip1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
      - run: cargo build -p ciris-game-engine-core --release --target wasm32-unknown-unknown
      - run: cargo build -p ciris-game-engine-core --release --target wasm32-wasip1
