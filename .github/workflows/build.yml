name: Build and Deploy

# CIRISGame primary build pipeline. The filename + headline name mirror
# CIRISAgent/.github/workflows/build.yml — but where the agent build runs
# Python-side typecheck/test/wheel jobs, the game's analogue is the Rust
# build matrix (native desktop binaries + the browser-first WASM bundle).
#
# Sibling-derived structure:
#   - typecheck      ← CIRISAgent build.yml typecheck       (here: cargo check)
#   - test           ← CIRISAgent build.yml test (sharded)  (here: cargo test --all)
#   - build (matrix) ← CIRISAgent build.yml build-wheel     (here: native + wasm)
#
# Heavy Python-side jobs in the upstream file (staged-qa, build-wheel-headless,
# publish-wheels, register-build, deploy, android-release) have no Rust
# analogue here and are not stubbed — the release.yml workflow covers the
# tag-triggered artifact path, and the app-store-style lanes that DO have a
# game analogue (Android/iOS via wasm + web wrapper, App Store) are stubbed
# in release.yml as TODOs against secrets.* names.

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Analogue of CIRISAgent build.yml's `typecheck` job: surface compile
  # errors fast on a single OS before paying for the full matrix. Cheap.
  typecheck:
    name: Cargo Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install renderer build deps (Linux)
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libx11-dev libxkbcommon-dev libwayland-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
      - run: cargo check --all-targets

  # Analogue of CIRISAgent build.yml's `test` job (sharded 1..8). Rust's
  # cargo test doesn't shard the way pytest-split does; this is a single
  # job on Linux. The OS coverage for tests is in ci.yml's clippy-test
  # matrix — running cargo test on three OSes from BOTH workflows is wasted
  # runner time.
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install renderer build deps (Linux)
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libx11-dev libxkbcommon-dev libwayland-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
      - run: cargo test --all --verbose

  # Analogue of CIRISAgent build.yml's `build-wheel` matrix — produces the
  # download artifacts a human/agent grabs from a CI run. Three OS lanes for
  # the native desktop binary, one dedicated WASM lane for the browser build.
  build:
    name: Build (${{ matrix.name }})
    needs: [typecheck]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
            target: x86_64-unknown-linux-gnu
            kind: native
          - os: macos-latest
            name: macOS ARM64
            target: aarch64-apple-darwin
            kind: native
          - os: macos-13
            name: macOS x64
            target: x86_64-apple-darwin
            kind: native
          - os: windows-latest
            name: Windows x64
            target: x86_64-pc-windows-msvc
            kind: native
          - os: ubuntu-latest
            name: WASM (browser)
            target: wasm32-unknown-unknown
            kind: wasm
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install renderer build deps (Linux native)
        if: runner.os == 'Linux' && matrix.kind == 'native'
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libx11-dev libxkbcommon-dev libwayland-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev pkg-config

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
          key: build-${{ matrix.target }}

      # WASM lane: install wasm-bindgen-cli for the post-cargo binding step
      # (macroquad/bevy/three-bridge all need it). Pinned to a recent
      # known-good; bump as the toolchain moves.
      - name: Install wasm-bindgen-cli
        if: matrix.kind == 'wasm'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 30
          command: cargo install wasm-bindgen-cli --version 0.2.95 --locked

      - name: Build (native)
        if: matrix.kind == 'native'
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (wasm32)
        if: matrix.kind == 'wasm'
        shell: bash
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Stage native binary
        if: matrix.kind == 'native'
        shell: bash
        run: |
          mkdir -p stage
          EXT=""; [ "${{ runner.os }}" = "Windows" ] && EXT=".exe"
          BIN="target/${{ matrix.target }}/release/ciris-game${EXT}"
          if [ -f "$BIN" ]; then
            if [ "${{ runner.os }}" != "Windows" ]; then strip "$BIN" || true; fi
            cp "$BIN" stage/
          else
            # Fallback: copy every release binary so the artifact is never empty
            # while the crate's bin name is still being chosen.
            find target/${{ matrix.target }}/release -maxdepth 1 -type f -perm -u+x -exec cp {} stage/ \;
          fi
          ls -lh stage/

      - name: Stage wasm bundle
        if: matrix.kind == 'wasm'
        shell: bash
        run: |
          mkdir -p stage
          # Run wasm-bindgen against every release .wasm; the renderer
          # commitment (macroquad vs bevy vs three-bridge) decides which
          # file actually loads in the browser, but the bundling step is
          # the same.
          for w in target/wasm32-unknown-unknown/release/*.wasm; do
            [ -f "$w" ] || continue
            wasm-bindgen --target web --out-dir stage "$w"
          done
          # If a static web/ folder exists in the repo (index.html, css),
          # ship it alongside the bindings.
          if [ -d web ]; then cp -R web/* stage/; fi
          ls -lh stage/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciris-game-${{ matrix.target }}
          path: stage/
          if-no-files-found: error
          retention-days: 30
