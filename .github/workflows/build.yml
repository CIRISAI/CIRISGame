name: Build and Deploy

# CIRISGame primary build pipeline. Sibling-shaped to CIRISServer's build
# matrix — native desktop binaries + WASM bundles + Android cross-compiles.
#
# Platform count: 10 active runner lanes across 10 target platforms.
#   Native desktop (5): linux x86_64, linux aarch64, macOS arm64, macOS x86_64, windows x64
#   WASM browser   (2): wasm32-unknown-unknown × {webgpu, webgl2}  (CLAUDE.md §build)
#   WASM Worker    (1): wasm32-wasip1  (daily-seed replay Cloudflare Worker)
#   Android        (2): arm64-v8a, armeabi-v7a  (NDK cross, continue-on-error)
#   iOS            (—): reuses the WASM browser bundles via WKWebView
#
# Feature discipline (avoids the webgpu+webgl2 mutual-exclusion clash):
#   native desktop → cargo build -p ciris-game-engine              (default = native)
#   wasm browser   → cargo build -p ciris-game-engine --no-default-features --features {webgpu|webgl2}
#   wasm32-wasip1  → cargo build -p ciris-game-engine-core         (no_std lib only)
#   android        → cargo build -p ciris-game-engine-core         (native view won't cross-compile)

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Fast compile-check before paying for the full matrix ──────────────────
  typecheck:
    name: Cargo Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Bevy's native feature (default) needs the Linux window/audio stack.
      - name: Install renderer build deps (Linux)
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libx11-dev libxkbcommon-dev libwayland-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev pkg-config
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
      - run: cargo check --all-targets

  # ── Focused test run — core only (view crate has no tests) ────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
      - run: cargo test -p ciris-game-engine-core --verbose

  # ── Platform build matrix (10 active lanes) ───────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    needs: [typecheck]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    # Android lanes are experimental (NDK cross) and must not red the matrix.
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native desktop (5 targets) ────────────────────────────────────────
          - os: ubuntu-latest
            name: "Linux x86_64"
            target: x86_64-unknown-linux-gnu
            kind: native
            artifact: ciris-game-linux-x86_64
          - os: ubuntu-24.04-arm
            name: "Linux aarch64"
            target: aarch64-unknown-linux-gnu
            kind: native
            artifact: ciris-game-linux-aarch64
          - os: macos-latest
            name: "macOS arm64"
            target: aarch64-apple-darwin
            kind: native
            artifact: ciris-game-macos-arm64
          - os: macos-15-intel
            name: "macOS x86_64"
            target: x86_64-apple-darwin
            kind: native
            artifact: ciris-game-macos-x86_64
          - os: windows-latest
            name: "Windows x64"
            target: x86_64-pc-windows-msvc
            kind: native
            artifact: ciris-game-windows-x64
          # WASM browser bundles (2 lanes — webgpu primary, webgl2 fallback) ──
          # Bevy issue #13168 blocks a single binary from runtime backend
          # selection, so both are built separately (CLAUDE.md stack note).
          # Both artifacts double as the iOS WKWebView payload.
          - os: ubuntu-latest
            name: "WASM webgpu"
            target: wasm32-unknown-unknown
            kind: wasm-browser
            feature: webgpu
            artifact: ciris-game-wasm32-webgpu
          - os: ubuntu-latest
            name: "WASM webgl2"
            target: wasm32-unknown-unknown
            kind: wasm-browser
            feature: webgl2
            artifact: ciris-game-wasm32-webgl2
          # WASM replay Worker (Cloudflare wasm32-wasip1) ─────────────────────
          - os: ubuntu-latest
            name: "WASM Worker"
            target: wasm32-wasip1
            kind: wasm-wasip1
            artifact: ciris-game-wasm32-wasip1
          # Android NDK cross-compiles (core only; native Bevy view does not
          # cross-compile to Android NDK targets) ─────────────────────────────
          - os: ubuntu-latest
            name: "Android arm64"
            target: aarch64-linux-android
            kind: android
            abi: arm64-v8a
            clang: aarch64-linux-android24-clang
            artifact: ciris-game-android-arm64-v8a
            experimental: true
          - os: ubuntu-latest
            name: "Android armv7"
            target: armv7-linux-androideabi
            kind: android
            abi: armeabi-v7a
            clang: armv7a-linux-androideabi24-clang
            artifact: ciris-game-android-armeabi-v7a
            experimental: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux renderer deps: Bevy's native feature requires the X/Wayland/audio
      # stack. macOS and Windows pull their frameworks through cargo directly.
      - name: Install renderer build deps (Linux native)
        if: runner.os == 'Linux' && matrix.kind == 'native'
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/azure-cli.sources
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libx11-dev libxkbcommon-dev libwayland-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev pkg-config

      # Android NDK + cross-compiler env ──────────────────────────────────────
      - name: Set up Android NDK
        if: matrix.kind == 'android'
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Export Android cross-compiler env
        if: matrix.kind == 'android'
        shell: bash
        run: |
          TC="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          TUS="$(echo '${{ matrix.target }}' | tr '-' '_')"
          TSC="$(echo "$TUS" | tr '[:lower:]' '[:upper:]')"
          {
            echo "CARGO_TARGET_${TSC}_LINKER=${TC}/${{ matrix.clang }}"
            echo "CC_${TUS}=${TC}/${{ matrix.clang }}"
            echo "AR_${TUS}=${TC}/llvm-ar"
          } >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
          key: build-${{ matrix.artifact }}

      # wasm-bindgen-cli: required for the Bevy WASM binary → JS/wasm bundle step.
      # Pinned to the version that matches Bevy 0.19's wasm-bindgen dependency.
      - name: Install wasm-bindgen-cli
        if: matrix.kind == 'wasm-browser'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 30
          command: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build (native — default/native feature)
        if: matrix.kind == 'native'
        shell: bash
        run: cargo build -p ciris-game-engine --release --target ${{ matrix.target }}

      - name: Build (wasm32 browser — ${{ matrix.feature }})
        if: matrix.kind == 'wasm-browser'
        shell: bash
        # webgpu and webgl2 are mutually exclusive wgpu backends; always build
        # with --no-default-features to prevent native pulling in x11/wayland.
        run: >-
          cargo build -p ciris-game-engine
          --no-default-features --features ${{ matrix.feature }}
          --release --target wasm32-unknown-unknown

      - name: Build (wasm32-wasip1 replay Worker core)
        if: matrix.kind == 'wasm-wasip1'
        shell: bash
        # Builds the no_std core for the daily-seed Cloudflare Worker.
        # A [[bin]] wasi-replay target will be added when the Worker binary is
        # wired (CLAUDE.md §build); until then this validates the cross-compile.
        run: cargo build -p ciris-game-engine-core --release --target wasm32-wasip1

      - name: Build (Android NDK cross — core only)
        if: matrix.kind == 'android'
        shell: bash
        # The native Bevy view (x11/wayland) does not cross-compile to Android
        # NDK. Build the no_std core; the game view will come via a WebView
        # wrapper of the wasm32-unknown-unknown bundle.
        run: cargo build -p ciris-game-engine-core --release --target ${{ matrix.target }}

      # ── Stage artifacts ───────────────────────────────────────────────────
      - name: Stage native binary
        if: matrix.kind == 'native'
        shell: bash
        run: |
          mkdir -p stage
          EXT=""; [ "${{ runner.os }}" = "Windows" ] && EXT=".exe"
          BIN="target/${{ matrix.target }}/release/ciris-game${EXT}"
          if [ -f "$BIN" ]; then
            if [ "${{ runner.os }}" != "Windows" ]; then strip "$BIN" || true; fi
            cp "$BIN" stage/
          fi
          echo "target=${{ matrix.target }} date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > stage/BUILD_MANIFEST.txt
          ls -lh stage/

      - name: Stage wasm browser bundle (${{ matrix.feature }})
        if: matrix.kind == 'wasm-browser'
        shell: bash
        run: |
          mkdir -p stage
          # The Bevy WASM binary is ciris-game.wasm; wasm-bindgen produces the
          # JS glue + the final _bg.wasm that the browser loader fetches.
          w="target/wasm32-unknown-unknown/release/ciris-game.wasm"
          if [ -f "$w" ]; then
            wasm-bindgen --target web --out-dir stage "$w"
          fi
          if [ -d web ]; then cp -R web/* stage/; fi
          echo "target=wasm32-unknown-unknown feature=${{ matrix.feature }} date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > stage/BUILD_MANIFEST.txt
          ls -lh stage/

      - name: Stage wasm32-wasip1 Worker
        if: matrix.kind == 'wasm-wasip1'
        shell: bash
        run: |
          mkdir -p stage
          for w in target/wasm32-wasip1/release/*.wasm; do
            [ -f "$w" ] || continue
            cp "$w" stage/
          done
          echo "target=wasm32-wasip1 date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > stage/BUILD_MANIFEST.txt
          ls -lh stage/

      - name: Stage Android lib
        if: matrix.kind == 'android'
        shell: bash
        run: |
          mkdir -p "stage/${{ matrix.abi }}"
          find "target/${{ matrix.target }}/release" -maxdepth 1 \
            \( -name "*.so" -o -name "*.a" \) \
            -exec cp {} "stage/${{ matrix.abi }}/" \; 2>/dev/null || true
          echo "target=${{ matrix.target }} abi=${{ matrix.abi }} date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > stage/BUILD_MANIFEST.txt
          ls -lh stage/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: stage/
          # warn keeps the matrix green even when a lane's output is incomplete.
          if-no-files-found: warn
          retention-days: 30
